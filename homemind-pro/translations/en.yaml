configuration:
  llm_mode:
    name: LLM Mode
    description: >-
      Choose "cloud" to use HomeMind PRO's managed AI service, or "byok" to bring your own API key.
  cloud:
    name: "HomeMind PRO Cloud"
    description: >-
      Settings for HomeMind PRO Cloud mode. Get your API key at homemindpro.com.
    api_key:
      name: HomeMind PRO API Key
      description: >-
        Your HomeMind PRO API key from homemindpro.com. Required when LLM Mode is "cloud".
  byok:
    name: "Bring Your Own Key (BYOK)"
    description: >-
      Settings for using your own API key. Best-effort; for serious local/custom-model setups, see home-mind (open source). Only used when LLM Mode is "byok".
    provider:
      name: Provider
      description: >-
        Which LLM provider to use. OpenRouter gives access to many models with a single key.
    api_key:
      name: API Key
      description: >-
        Your API key for the selected provider.
    model:
      name: Model
      description: >-
        Model ID to use. Examples: anthropic/claude-haiku-4.5 (OpenRouter),
        claude-haiku-4-5-20251001 (Anthropic), gpt-4o-mini (OpenAI). Leave empty for provider default.
    base_url:
      name: API Base URL
      description: >-
        Custom API endpoint. Required for Ollama (e.g. http://homeassistant:11434/v1).
        Leave empty for cloud providers.
  custom_prompt:
    name: Custom Prompt
    description: >-
      Override the AI assistant's personality and instructions. Leave empty for the default HomeMind PRO persona.
  log_level:
    name: Log Level
    description: >-
      Logging verbosity. Use "debug" for troubleshooting.
